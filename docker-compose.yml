services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - FILE_TTL_SECONDS=3600
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
    volumes:
      - downloads:/app/downloads
      - ./cookies.txt:/app/cookies.txt:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "--max-time", "5", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  watchdog:
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./watchdog.sh:/watchdog.sh:ro
    environment:
      - TARGET_CONTAINER=insta_downloader-app-1
      - HEALTH_URL=http://app:5000/api/health
      - CHECK_INTERVAL=60
      - MAX_FAILURES=3
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/watchdog.sh"]

volumes:
  downloads:
